name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is empty or missing"
            exit 1
          fi
          echo "HF_TOKEN is available"

      - name: Build clean Space repository
        run: |
          mkdir hf-space
          cp -r finapi/app.py hf-space/
          cp -r finapi/Dockerfile hf-space/
          cp -r finapi/README.md hf-space/
          cp -r finapi/requirements.txt hf-space/
          cp -r finapi/dashboard hf-space/
          cp -r finapi/finapi hf-space/
          cp -r finapi/scripts hf-space/
          cp -r finapi/pyproject.toml hf-space/

      - name: Push clean repository to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git init
          git config user.email "ci@finapi.dev"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy clean Hugging Face Space"
          git branch -M main
          git push --force https://oauth2:${HF_TOKEN}@huggingface.co/spaces/FediLejmi1/finsentiment main